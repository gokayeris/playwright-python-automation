name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install playwright pytest pytest-html python-dotenv
        playwright install --with-deps

    - name: Run Playwright tests
      run: python -m pytest --html=report.html --self-contained-html
      env:
        # Aquí mapeamos las variables de tu .env a GitHub Secrets
        SAUCE_USER: ${{ secrets.SAUCE_USER }}
        SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: playwright-report
        path: report.html