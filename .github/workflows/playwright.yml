name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Forzamos Node 24 de forma global para eliminar definitivamente los warnings amarillos
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    # --- ACTIVACIÓN DE MULTI-BROWSER ---
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    # --------------------------------------
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

    - name: Install Playwright Browsers
      run: playwright install --with-deps

    - name: Run tests on ${{ matrix.browser }}
      # Usamos la variable ${{ matrix.browser }} para que cada job use su navegador
      run: python -m pytest -n 2 --browser ${{ matrix.browser }} --html=report-${{ matrix.browser }}.html --self-contained-html
      env:
        SAUCE_USER: ${{ secrets.SAUCE_USER }}
        SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: report-${{ matrix.browser }}
        path: report-${{ matrix.browser }}.html