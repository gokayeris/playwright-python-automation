name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    # 1. Agregamos esta variable para eliminar el warning de la imagen image_1aba7c.png
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install --with-deps

    - name: Run tests
      # 2. Agregamos -n 2 para ejecutar en paralelo en los 2 núcleos de GitHub
      run: python -m pytest -n 2 --html=report.html --self-contained-html
      env:
        SAUCE_USER: ${{ secrets.SAUCE_USER }}
        SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: report.html