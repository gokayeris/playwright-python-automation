name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Variables globales para silenciar avisos y forzar versiones modernas
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # Esto lanza 3 ejecuciones simultáneas: una por cada navegador
      matrix:
        browser: [chromium, firefox, webkit]
      fail-fast: false # Permite que si falla un navegador, los otros sigan corriendo

    steps:
    - name: Checkout code
      uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.3.0
      with:
        python-version: '3.11'
        cache: 'pip' # Cache automático de librerías de Python

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

    - name: Install Playwright Browsers
      run: playwright install --with-deps

    - name: Run tests on ${{ matrix.browser }}
      # -n 2 activa los 2 núcleos de GitHub para paralelismo interno
      run: python -m pytest -n 2 --browser ${{ matrix.browser }} --html=report-${{ matrix.browser }}.html --self-contained-html
      env:
        SAUCE_USER: ${{ secrets.SAUCE_USER }}
        SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4.4.3
      with:
        name: report-${{ matrix.browser }}
        path: report-${{ matrix.browser }}.html