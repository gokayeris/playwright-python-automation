name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Variables globales para forzar el uso de entornos modernos y silenciar ruidos de sistema
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  test:
    # Usamos la versión estable más reciente de Ubuntu disponible en GitHub
    runs-on: ubuntu-24.04
    
    strategy:
      # Matrix lanza 3 trabajos independientes en paralelo (uno por cada navegador)
      matrix:
        browser: [chromium, firefox, webkit]
      fail-fast: false # Si un navegador falla, los otros terminan su ejecución normalmente

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Cache optimizado para dependencias de Python

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers
      run: playwright install --with-deps

    - name: Run tests on ${{ matrix.browser }}
      # -n 2 activa el paralelismo interno aprovechando los 2 núcleos del procesador
      run: python -m pytest -n 2 --browser ${{ matrix.browser }} --screenshot=only-on-failure --video=retain-on-failure --html=report-${{ matrix.browser }}.html --self-contained-html
      env:
        SAUCE_USER: ${{ secrets.SAUCE_USER }}
        SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: report-${{ matrix.browser }}
        path: report-${{ matrix.browser }}.html