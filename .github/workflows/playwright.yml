name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-playwright 
        playwright install --with-deps

    - name: Run tests
      # Agregamos parámetros para generar el reporte HTML
      run: python -m pytest --html=report.html --self-contained-html
      env:
        SAUCE_USER: ${{ secrets.SAUCE_USER }}
        SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

    - name: Upload Test Report
      # Esto hace que el reporte se suba incluso si los tests fallan
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: report.html